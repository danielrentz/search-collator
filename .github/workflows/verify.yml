name: Verify

on: push

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v5

      - run: pnpm audit
      - run: pnpm install
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
